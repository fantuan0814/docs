<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gavin CRM</title>
    <link rel="stylesheet" href="./styles.css?v=20260512-fix1" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">G</div>
        <div>
          <h1>Gavin CRM</h1>
          <p>客户、询盘、PI 和报价</p>
        </div>
      </div>
      <nav class="nav" aria-label="主导航">
        <button class="nav-btn active" data-view="dashboard">提醒</button>
        <button class="nav-btn" data-view="customers">客户</button>
        <button class="nav-btn" data-view="inquiries">询盘中心</button>
        <button class="nav-btn" data-view="orders">订单</button>
        <button class="nav-btn" data-view="kanban">看板</button>
        <button class="nav-btn" data-view="reports">报表</button>
        <button class="nav-btn" data-view="products">产品</button>
      </nav>
      <div class="side-tools">
        <button id="mergeCustomerBtn" class="ghost-btn" type="button">合并客户</button>
        <button id="printPIBtn" class="ghost-btn" type="button">打印PI</button>
        <button id="exportBtn" class="ghost-btn" type="button">导出数据</button>
        <label class="ghost-btn file-btn">
          导入数据
          <input id="importInput" type="file" accept="application/json" />
        </label>
      </div>
    </aside>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <h2 id="viewTitle">今日提醒</h2>
          <p id="viewSubtitle">打开后先看这里，知道今天要回谁、发什么。</p>
        </div>
        <div class="top-actions">
          <button id="themeToggle" class="theme-toggle" type="button" title="切换深色模式">🌙</button>
          <div id="cloudStatus" class="cloud-status">本地模式</div>
          <input id="emailLoginInput" class="login-input" type="email" placeholder="邮箱" />
          <input id="passwordLoginInput" class="login-input" type="password" placeholder="密码" />
          <button id="loginBtn" class="ghost-btn" type="button">登录</button>
          <button id="signupBtn" class="ghost-btn" type="button">注册</button>
          <button id="logoutBtn" class="ghost-btn hidden" type="button">退出</button>
          <button id="quickAddBtn" class="primary-btn" type="button">新增客户</button>
        </div>
      </header>

      <div id="bulkBar" class="bulk-bar">
          <span id="bulkCount">已选 0 项</span>
          <button class="ghost-btn" id="bulkDeleteBtn" type="button">批量删除</button>
          <button class="ghost-btn" id="bulkStageBtn" type="button">批量改阶段</button>
          <button class="ghost-btn" id="bulkCancelBtn" type="button">取消选择</button>
        </div>
        <div class="date-range-filter" id="dateRangeFilter" style="display:none;margin-bottom:10px;">
          <label>日期范围：<input type="date" id="dateFrom"> 至 <input type="date" id="dateTo"></label>
          <button class="ghost-btn" id="clearDateFilter" type="button">清除</button>
        </div>
        <section id="dashboard" class="view active-view">
        <div class="stats-grid">
          <article class="stat">
            <span>待跟进</span>
            <strong id="statDue">0</strong>
          </article>
          <article class="stat">
            <span>客户总数</span>
            <strong id="statCustomers">0</strong>
          </article>
          <article class="stat">
            <span>询盘总数</span>
            <strong id="statInquiries">0</strong>
          </article>
          <article class="stat">
            <span>订单总数</span>
            <strong id="statOrders">0</strong>
          </article>
        </div>
        <div class="charts-grid">
          <article class="chart-panel">
            <div class="section-head compact"><h3>国家分布</h3></div>
            <div id="countryChart" class="bar-chart"></div>
          </article>
          <article class="chart-panel">
            <div class="section-head compact"><h3>产品需求</h3></div>
            <div id="productChart" class="bar-chart"></div>
          </article>
        </div>
        <div class="section-head">
          <h3>跟进提醒</h3>
          <div class="segmented" role="tablist" aria-label="提醒筛选">
            <button class="segment active" data-reminder-filter="all" type="button">全部</button>
            <button class="segment" data-reminder-filter="today" type="button">今天</button>
            <button class="segment" data-reminder-filter="overdue" type="button">逾期</button>
            <button class="segment" data-reminder-filter="week" type="button">7天内</button>
          </div>
        </div>
        <div id="reminderList" class="list"></div>
      </section>

      <section id="customers" class="view">
        <div class="toolbar">
          <input id="customerSearch" class="search" type="search" placeholder="搜索客户、电话、产品、来源" />
        </div>
        <div id="customerList" class="table-wrap"></div>
      </section>

      <section id="inquiries" class="view">
        <div class="filter-panel">
          <div class="filter-row">
            <select id="inquiryStageFilter" class="search small-select"></select>
            <select id="inquirySourceFilter" class="search small-select"></select>
            <select id="inquiryProductFilter" class="search small-select"></select>
            <button class="ghost-btn" id="clearInquiryFilters" type="button">清空筛选</button>
          </div>
          <div id="inquirySummary" class="mini-grid"></div>
        </div>
        <div class="toolbar">
          <input id="inquirySearch" class="search" type="search" placeholder="搜索询盘、客户、需求、来源" />
        </div>
        <div id="inquiryFocus" class="focus-panel"></div>
        <div id="inquiryList" class="table-wrap"></div>
      </section>

      <section id="followups" class="view">
        <div class="toolbar">
          <input id="followSearch" class="search" type="search" placeholder="搜索沟通内容、客户、要发内容" />
        </div>
        <div id="followList" class="table-wrap"></div>
      </section>

      <section id="orders" class="view">
        <div class="toolbar">
          <input id="orderSearch" class="search" type="search" placeholder="搜索订单、客户、产品" />
        </div>
        <div id="piPreview" class="pi-preview"></div>
        <div id="orderList" class="table-wrap"></div>
      </section>

      <section id="products" class="view">
        <div class="filter-panel">
          <div class="section-head compact"><h3>FOB / CFR 价格计算器</h3></div>
          <div id="fobCalculator" class="calc-grid"></div>
          <div id="fobResult" class="calc-result"></div>
        </div>
        <div class="toolbar">
          <input id="productSearch" class="search" type="search" placeholder="搜索产品名称、型号、参数、价格" />
          <select id="productCategoryFilter" class="search small-select" aria-label="产品大类筛选"></select>
        </div>
        <div id="productList" class="table-wrap"></div>
      </section>
  
      <section id="kanban" class="view">
        <div class="section-head">
          <h3>询盘看板</h3>
          <p>拖拽卡片切换阶段，实时查看销售漏斗</p>
        </div>
        <div id="kanbanBoard" class="kanban-board"></div>
      </section>

      <section id="reports" class="view">
        <div class="section-head">
          <h3>数据报表</h3>
          <p>收入分析、转化率、月度趋势一目了然</p>
        </div>
        <div class="report-grid">
          <div class="report-card">
            <h4>总营收 (USD)</h4>
            <div class="big-num" id="reportRevenue">0</div>
            <div class="trend" id="reportRevenueTrend"></div>
          </div>
          <div class="report-card">
            <h4>本月订单数</h4>
            <div class="big-num" id="reportMonthOrders">0</div>
            <div class="trend" id="reportOrderTrend"></div>
          </div>
          <div class="report-card">
            <h4>询盘转化率</h4>
            <div class="big-num" id="reportConversion">0%</div>
            <div class="trend" id="reportConvTrend"></div>
          </div>
          <div class="report-card report-full">
            <h4>销售漏斗</h4>
            <div id="funnelChart" class="bar-chart"></div>
          </div>
          <div class="report-card report-full">
            <h4>月度营收趋势</h4>
            <div id="monthlyRevenueChart" class="bar-chart"></div>
          </div>
        </div>
      </section>

  </main>

    <dialog id="formDialog">
      <form id="recordForm" method="dialog">
        <div class="dialog-head">
          <h3 id="dialogTitle">新增</h3>
          <button class="icon-btn" id="closeDialogBtn" type="button" aria-label="关闭">×</button>
        </div>
        <div id="formFields" class="form-grid"></div>
        <footer class="dialog-actions">
          <button class="ghost-btn" type="button" id="cancelBtn">取消</button>
          <button class="primary-btn" type="submit">保存</button>
        </footer>
      </form>
    </dialog>

    <dialog id="detailDialog">
      <div class="detail-box">
        <div class="dialog-head">
          <h3 id="detailTitle">详情</h3>
          <button class="icon-btn" id="closeDetailBtn" type="button" aria-label="关闭">×</button>
        </div>
        <div id="detailBody" class="detail-body"></div>
        <footer class="dialog-actions">
          <button class="ghost-btn" type="button" id="detailEditBtn">编辑</button>
          <button class="primary-btn" type="button" id="detailDoneBtn">知道了</button>
        </footer>
      </div>
    </dialog>

    <dialog id="mergeDialog">
      <div class="detail-box">
        <div class="dialog-head">
          <h3>合并客户</h3>
          <button class="icon-btn" id="closeMergeBtn" type="button" aria-label="关闭">×</button>
        </div>
        <div class="detail-body">
          <div class="merge-selector">
            <div class="merge-col">
              <h4>源客户（将被合并）</h4>
              <div id="mergeSourceList"></div>
            </div>
            <div class="merge-col">
              <h4>目标客户（保留）</h4>
              <div id="mergeTargetList"></div>
            </div>
          </div>
        </div>
        <footer class="dialog-actions">
          <button class="ghost-btn" type="button" id="cancelMergeBtn">取消</button>
          <button class="primary-btn" type="button" id="confirmMergeBtn">确认合并</button>
        </footer>
      </div>
    </dialog>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./product-data.js?v=20260512-fix1"></script>
    <script src="./app.js?v=20260512-fix1"></script>
<button class="quick-follow-btn" id="quickFollowBtn" type="button" title="快速添加跟进">+</button>
<button class="mobile-nav-toggle" id="mobileNavToggle" type="button" aria-label="菜单">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
</body>
</html>
